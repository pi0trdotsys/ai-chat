<svg viewBox="0 0 480 320" xmlns="http://www.w3.org/2000/svg" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0f0c29"/>
      <stop offset="1" stop-color="#1a1730"/>
    </linearGradient>
    <linearGradient id="grad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#a78bfa"/>
      <stop offset="1" stop-color="#60a5fa"/>
    </linearGradient>
  </defs>

  <rect width="480" height="320" fill="url(#bg)"/>

  <!-- Blurred backdrop -->
  <rect width="480" height="320" fill="rgba(0,0,0,0.4)"/>

  <!-- Model picker dropdown -->
  <rect x="120" y="40" width="240" height="240" rx="16" fill="rgba(22,19,46,0.97)" stroke="rgba(167,139,250,0.25)" stroke-width="0.5"/>

  <!-- Header -->
  <rect x="120" y="40" width="240" height="36" rx="16" fill="rgba(22,19,46,0.97)"/>
  <rect x="120" y="60" width="240" height="16" fill="rgba(22,19,46,0.97)"/>
  <text x="140" y="63" font-size="9" fill="rgba(255,255,255,0.3)" letter-spacing="2">WYBIERZ MODEL</text>
  <line x1="120" y1="76" x2="360" y2="76" stroke="rgba(255,255,255,0.07)" stroke-width="1"/>

  <!-- Model 1 - active -->
  <rect x="120" y="76" width="240" height="80" fill="rgba(167,139,250,0.13)"/>
  <text x="148" y="107" font-size="22">🐬</text>
  <text x="180" y="103" font-size="13" font-weight="600" fill="rgba(255,255,255,0.92)">Dolphin PL (8B)</text>
  <rect x="280" y="91" width="44" height="14" rx="4" fill="rgba(167,139,250,0.2)"/>
  <text x="302" y="102" text-anchor="middle" font-size="8" fill="#a78bfa" letter-spacing="1">AKTYWNY</text>
  <text x="180" y="120" font-size="11" fill="rgba(255,255,255,0.45)">Szybki - odpowiada w kilka sekund.</text>
  <text x="180" y="135" font-size="11" fill="rgba(255,255,255,0.45)">Bez cenzury, bez ograniczeń, po polsku.</text>

  <!-- Tags -->
  <rect x="180" y="142" width="52" height="15" rx="4" fill="rgba(96,165,250,0.15)"/>
  <text x="206" y="153" text-anchor="middle" font-size="9" fill="rgba(96,165,250,0.8)">bez cenzury</text>
  <rect x="238" y="142" width="38" height="15" rx="4" fill="rgba(96,165,250,0.15)"/>
  <text x="257" y="153" text-anchor="middle" font-size="9" fill="rgba(96,165,250,0.8)">szybki</text>

  <line x1="120" y1="160" x2="360" y2="160" stroke="rgba(255,255,255,0.05)" stroke-width="1"/>

  <!-- Model 2 -->
  <rect x="120" y="160" width="240" height="80" fill="transparent"/>
  <text x="148" y="191" font-size="22">🧠</text>
  <text x="180" y="187" font-size="13" font-weight="600" fill="rgba(255,255,255,0.92)">Qwen 2.5 Abliterated (14B)</text>
  <text x="180" y="204" font-size="11" fill="rgba(255,255,255,0.45)">Najmądrzejszy - lepsze odpowiedzi,</text>
  <text x="180" y="219" font-size="11" fill="rgba(255,255,255,0.45)">głębsza analiza. Wolniejszy.</text>

  <!-- Tags -->
  <rect x="180" y="226" width="52" height="15" rx="4" fill="rgba(167,139,250,0.15)"/>
  <text x="206" y="237" text-anchor="middle" font-size="9" fill="rgba(167,139,250,0.8)">bez cenzury</text>
  <rect x="238" y="226" width="64" height="15" rx="4" fill="rgba(167,139,250,0.15)"/>
  <text x="270" y="237" text-anchor="middle" font-size="9" fill="rgba(167,139,250,0.8)">najmądrzejszy</text>

  <!-- Trigger button hint -->
  <rect x="176" y="272" width="128" height="28" rx="14" fill="rgba(167,139,250,0.1)" stroke="rgba(167,139,250,0.22)" stroke-width="0.5"/>
  <circle cx="192" cy="286" r="4" fill="#4ade80"/>
  <text x="201" y="290" font-size="11" font-weight="500" fill="rgba(255,255,255,0.85)">🐬 Dolphin PL ▾</text>
</svg>
