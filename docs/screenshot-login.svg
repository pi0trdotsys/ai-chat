<svg viewBox="0 0 480 640" xmlns="http://www.w3.org/2000/svg" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0f0c29"/>
      <stop offset="0.5" stop-color="#302b63"/>
      <stop offset="1" stop-color="#24243e"/>
    </linearGradient>
    <linearGradient id="grad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#a78bfa"/>
      <stop offset="1" stop-color="#60a5fa"/>
    </linearGradient>
    <radialGradient id="glow1" cx="25%" cy="40%">
      <stop offset="0" stop-color="#7850ff" stop-opacity="0.18"/>
      <stop offset="1" stop-color="transparent"/>
    </radialGradient>
    <radialGradient id="glow2" cx="78%" cy="75%">
      <stop offset="0" stop-color="#00b4ff" stop-opacity="0.12"/>
      <stop offset="1" stop-color="transparent"/>
    </radialGradient>
  </defs>

  <rect width="480" height="640" fill="url(#bg)"/>
  <ellipse cx="120" cy="256" rx="200" ry="180" fill="url(#glow1)"/>
  <ellipse cx="374" cy="480" rx="180" ry="160" fill="url(#glow2)"/>

  <!-- Logo -->
  <rect x="208" y="160" width="64" height="64" rx="18" fill="url(#grad)" opacity="0.95"/>
  <text x="240" y="202" text-anchor="middle" font-size="30">⚡</text>

  <!-- Wordmark -->
  <text x="240" y="262" text-anchor="middle" font-size="32" font-weight="700" fill="white">Bez </text>
  <text x="280" y="262" text-anchor="middle" font-size="32" font-weight="700" fill="url(#grad)">Filtra</text>

  <!-- Subtitle -->
  <text x="240" y="290" text-anchor="middle" font-size="13" fill="rgba(255,255,255,0.5)">Odpowiedź na każde pytanie</text>

  <!-- Badge -->
  <text x="240" y="320" text-anchor="middle" font-size="10" fill="rgba(255,255,255,0.3)" letter-spacing="3">BEZ CENZURY · BEZ TEMATÓW TABU</text>

  <!-- Password input -->
  <rect x="96" y="348" width="288" height="44" rx="12" fill="rgba(255,255,255,0.05)" stroke="rgba(167,139,250,0.3)" stroke-width="1"/>
  <text x="240" y="375" text-anchor="middle" font-size="13" fill="rgba(255,255,255,0.3)">Hasło dostępu</text>

  <!-- Button -->
  <rect x="96" y="408" width="288" height="44" rx="12" fill="url(#grad)" opacity="0.9"/>
  <text x="240" y="435" text-anchor="middle" font-size="14" font-weight="600" fill="white">Wejdź</text>

  <!-- Footer -->
  <text x="240" y="580" text-anchor="middle" font-size="10" fill="rgba(255,255,255,0.2)">crafted by NullPointer Studio · null safe, fully unchained</text>
</svg>
