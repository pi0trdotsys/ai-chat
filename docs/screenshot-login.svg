<svg viewBox="0 0 400 580" xmlns="http://www.w3.org/2000/svg" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0f0c29"/>
      <stop offset="0.5" stop-color="#302b63"/>
      <stop offset="1" stop-color="#24243e"/>
    </linearGradient>
    <linearGradient id="grad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#a78bfa"/>
      <stop offset="1" stop-color="#60a5fa"/>
    </linearGradient>
    <radialGradient id="glow1" cx="30%" cy="40%" r="60%">
      <stop offset="0" stop-color="#7850ff" stop-opacity="0.2"/>
      <stop offset="1" stop-color="#7850ff" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="glow2" cx="75%" cy="75%" r="50%">
      <stop offset="0" stop-color="#00b4ff" stop-opacity="0.13"/>
      <stop offset="1" stop-color="#00b4ff" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <rect width="400" height="580" fill="url(#bg)"/>
  <rect width="400" height="580" fill="url(#glow1)"/>
  <rect width="400" height="580" fill="url(#glow2)"/>

  <!-- Logo icon -->
  <rect x="172" y="120" width="56" height="56" rx="16" fill="url(#grad)"/>
  <text x="200" y="158" text-anchor="middle" font-size="28">⚡</text>

  <!-- Wordmark: "Bez Filtra" -->
  <text x="200" y="220" text-anchor="middle" font-size="34" font-weight="700">
    <tspan fill="white">Bez </tspan><tspan fill="url(#grad)">Filtra</tspan>
  </text>

  <!-- Subtitle -->
  <text x="200" y="252" text-anchor="middle" font-size="13" fill="rgba(255,255,255,0.5)">Odpowiedź na każde pytanie</text>

  <!-- Badge -->
  <text x="200" y="284" text-anchor="middle" font-size="10" fill="rgba(255,255,255,0.28)" letter-spacing="2.5">BEZ CENZURY · BEZ TEMATÓW TABU</text>

  <!-- Password input -->
  <rect x="60" y="316" width="280" height="46" rx="12" fill="rgba(255,255,255,0.05)" stroke="rgba(167,139,250,0.3)" stroke-width="1"/>
  <text x="200" y="344" text-anchor="middle" font-size="13" fill="rgba(255,255,255,0.25)">Hasło dostępu</text>

  <!-- Login button -->
  <rect x="60" y="378" width="280" height="46" rx="12" fill="url(#grad)"/>
  <text x="200" y="407" text-anchor="middle" font-size="14" font-weight="600" fill="white">Wejdź</text>

  <!-- Footer -->
  <text x="200" y="548" text-anchor="middle" font-size="10" fill="rgba(255,255,255,0.18)">crafted by NullPointer Studio · null safe, fully unchained</text>
</svg>
