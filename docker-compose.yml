services:
  ollama:
    image: ollama/ollama
    container_name: ollama
    volumes:
      - ollama_data:/root/.ollama
    environment:
      - OLLAMA_FLASH_ATTENTION=1      # szybsza uwaga, mniejsze zużycie pamięci
      - OLLAMA_KV_CACHE_TYPE=q4_0     # mały cache KV = więcej VRAM na warstwy modelu = szybciej
      - OLLAMA_KEEP_ALIVE=-1          # trzymaj model w RAM, bez przeładowań między pytaniami
      - OLLAMA_NUM_PARALLEL=1         # cały (wolny) CPU na jedno zapytanie naraz
    restart: unless-stopped
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]

  backend:
    build: ./backend
    container_name: ai-backend
    environment:
      - OLLAMA_URL=http://ollama:11434
      - DEFAULT_MODEL=${DEFAULT_MODEL:-huihui_ai/qwen2.5-abliterate:14b}
      - JWT_SECRET=${JWT_SECRET}
      - ACCESS_PASSWORD=${ACCESS_PASSWORD}
      - FRONTEND_URL=${FRONTEND_URL}
    ports:
      - "3001:3001"
    volumes:
      - ./logs:/app/logs
    depends_on:
      - ollama
    restart: unless-stopped

  frontend:
    build: ./frontend
    container_name: ai-frontend
    ports:
      - "5173:80"
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  ollama_data:
