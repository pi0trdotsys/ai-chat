services:
  ollama:
    image: ollama/ollama
    container_name: ollama
    volumes:
      - ollama_data:/root/.ollama
    restart: unless-stopped
    # GPU support (odkomentuj jeśli używasz ROCm na Vega 11)
    # devices:
    #   - /dev/kfd
    #   - /dev/dri

  backend:
    build: ./backend
    container_name: ai-backend
    environment:
      - OLLAMA_URL=http://ollama:11434
      - DEFAULT_MODEL=${DEFAULT_MODEL:-dolphin3:8b}
      - JWT_SECRET=${JWT_SECRET}
      - ACCESS_PASSWORD=${ACCESS_PASSWORD}
      - FRONTEND_URL=${FRONTEND_URL}
    ports:
      - "3001:3001"
    volumes:
      - ./logs:/app/logs
    depends_on:
      - ollama
    restart: unless-stopped

  frontend:
    build: ./frontend
    container_name: ai-frontend
    ports:
      - "5173:80"
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  ollama_data:
