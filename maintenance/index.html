<!doctype html>
<html lang="pl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta http-equiv="refresh" content="8" />
  <title>Bez Filtra · trwa aktualizacja</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { height: 100%; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
      background: linear-gradient(135deg, #0f0c29, #302b63, #24243e);
      color: #fff;
      display: flex; align-items: center; justify-content: center;
      min-height: 100vh; overflow: hidden; position: relative;
    }
    .glow {
      position: absolute; inset: 0; pointer-events: none;
      background:
        radial-gradient(ellipse at 25% 40%, rgba(120,80,255,0.18) 0%, transparent 55%),
        radial-gradient(ellipse at 78% 75%, rgba(0,180,255,0.12) 0%, transparent 50%);
    }
    .card { position: relative; text-align: center; padding: 0 24px; max-width: 420px; }
    .gear {
      width: 72px; height: 72px; margin: 0 auto 28px;
      animation: spin 3.4s linear infinite;
      filter: drop-shadow(0 8px 24px rgba(120,80,255,0.45));
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    .badge {
      display: inline-block; font-size: 11px; letter-spacing: 0.22em; text-transform: uppercase;
      color: rgba(255,255,255,0.4); margin-bottom: 14px;
    }
    h1 { font-size: 1.7rem; font-weight: 600; letter-spacing: -0.01em; margin-bottom: 10px; }
    .wordmark { font-weight: 700; }
    .wordmark .g {
      background: linear-gradient(135deg, #a78bfa, #60a5fa);
      -webkit-background-clip: text; background-clip: text; -webkit-text-fill-color: transparent;
    }
    p { font-size: 0.95rem; line-height: 1.6; color: rgba(255,255,255,0.6); }
    .bar {
      margin: 26px auto 0; width: 180px; height: 3px; border-radius: 3px;
      background: rgba(255,255,255,0.08); overflow: hidden; position: relative;
    }
    .bar::after {
      content: ''; position: absolute; top: 0; left: -40%; height: 100%; width: 40%;
      border-radius: 3px; background: linear-gradient(90deg, transparent, #a78bfa, #60a5fa, transparent);
      animation: slide 1.6s ease-in-out infinite;
    }
    @keyframes slide { 0% { left: -40%; } 100% { left: 100%; } }
    .hint { margin-top: 18px; font-size: 12px; color: rgba(255,255,255,0.3); }
  </style>
</head>
<body>
  <div class="glow"></div>
  <div class="card">
    <svg class="gear" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
      <defs>
        <linearGradient id="g" x1="0" y1="0" x2="1" y2="1">
          <stop offset="0" stop-color="#a78bfa" />
          <stop offset="1" stop-color="#60a5fa" />
        </linearGradient>
      </defs>
      <path fill="url(#g)" d="M12 8a4 4 0 1 0 0 8 4 4 0 0 0 0-8Zm0 2.2a1.8 1.8 0 1 1 0 3.6 1.8 1.8 0 0 1 0-3.6Z"/>
      <path fill="url(#g)" d="M19.4 13c.04-.33.06-.66.06-1s-.02-.67-.06-1l2.02-1.58a.5.5 0 0 0 .12-.64l-1.92-3.32a.5.5 0 0 0-.6-.22l-2.39.96a7.3 7.3 0 0 0-1.73-1l-.36-2.54a.5.5 0 0 0-.5-.42h-3.84a.5.5 0 0 0-.5.42l-.36 2.54c-.62.25-1.2.59-1.73 1l-2.39-.96a.5.5 0 0 0-.6.22L2.42 8.78a.5.5 0 0 0 .12.64L4.56 11c-.04.33-.06.66-.06 1s.02.67.06 1l-2.02 1.58a.5.5 0 0 0-.12.64l1.92 3.32c.13.22.39.31.6.22l2.39-.96c.53.41 1.11.75 1.73 1l.36 2.54a.5.5 0 0 0 .5.42h3.84a.5.5 0 0 0 .5-.42l.36-2.54c.62-.25 1.2-.59 1.73-1l2.39.96c.22.09.47 0 .6-.22l1.92-3.32a.5.5 0 0 0-.12-.64L19.4 13Zm-7.4 4.4A5.4 5.4 0 1 1 12 6.6a5.4 5.4 0 0 1 0 10.8Z" opacity="0.9"/>
    </svg>

    <div class="badge">503 · usługa chwilowo niedostępna</div>
    <h1>Trwa aktualizacja</h1>
    <p>
      <span class="wordmark">Bez <span class="g">Filtra</span></span> właśnie się dopieszcza.<br/>
      Wracamy za moment - ta strona odświeży się sama.
    </p>

    <div class="bar"></div>
    <div class="hint">automatyczne odświeżanie co kilka sekund…</div>
  </div>
</body>
</html>
