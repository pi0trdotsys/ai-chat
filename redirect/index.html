<!doctype html>
<html lang="pl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta http-equiv="refresh" content="8;url=https://bezfiltra.beer" />
  <title>Bez Filtra · przenosimy się</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { height: 100%; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
      background: linear-gradient(135deg, #0f0c29, #302b63, #24243e);
      color: #fff;
      display: flex; align-items: center; justify-content: center;
      min-height: 100vh; overflow: hidden; position: relative;
    }
    .glow {
      position: absolute; inset: 0; pointer-events: none;
      background:
        radial-gradient(ellipse at 20% 40%, rgba(120,80,255,0.2) 0%, transparent 55%),
        radial-gradient(ellipse at 80% 70%, rgba(0,180,255,0.13) 0%, transparent 50%);
    }
    .card {
      position: relative; text-align: center;
      padding: 0 28px; max-width: 460px; width: 100%;
    }
    .logo {
      width: 56px; height: 56px; margin: 0 auto 28px;
      border-radius: 16px;
      background: linear-gradient(135deg, #a78bfa, #60a5fa);
      display: flex; align-items: center; justify-content: center;
      font-size: 26px;
      box-shadow: 0 8px 32px rgba(120,80,255,0.4);
    }
    .wordmark {
      font-size: 2rem; font-weight: 700; letter-spacing: -0.02em;
      margin-bottom: 8px;
    }
    .wordmark .g {
      background: linear-gradient(135deg, #a78bfa, #60a5fa);
      -webkit-background-clip: text; background-clip: text;
      -webkit-text-fill-color: transparent;
    }
    .badge {
      display: inline-block; font-size: 11px; letter-spacing: 0.2em;
      text-transform: uppercase; color: rgba(255,255,255,0.35);
      margin-bottom: 28px;
    }
    .message {
      font-size: 1rem; line-height: 1.7;
      color: rgba(255,255,255,0.65);
      margin-bottom: 36px;
    }
    .message strong { color: rgba(255,255,255,0.9); }
    .btn {
      display: inline-block;
      padding: 14px 32px;
      border-radius: 12px;
      background: linear-gradient(135deg, #a78bfa, #60a5fa);
      color: #fff;
      font-size: 0.95rem;
      font-weight: 600;
      letter-spacing: 0.01em;
      text-decoration: none;
      box-shadow: 0 4px 20px rgba(120,80,255,0.35);
      transition: opacity 0.2s, transform 0.2s;
    }
    .btn:hover { opacity: 0.88; transform: translateY(-1px); }
    .countdown {
      margin-top: 20px;
      font-size: 12px;
      color: rgba(255,255,255,0.28);
    }
    .countdown span {
      color: rgba(255,255,255,0.5);
      font-variant-numeric: tabular-nums;
    }
    .bar {
      margin: 32px auto 0; width: 200px; height: 2px; border-radius: 2px;
      background: rgba(255,255,255,0.07); overflow: hidden; position: relative;
    }
    .bar::after {
      content: ''; position: absolute; top: 0; left: -40%; height: 100%; width: 40%;
      border-radius: 2px;
      background: linear-gradient(90deg, transparent, #a78bfa, #60a5fa, transparent);
      animation: slide 1.8s ease-in-out infinite;
    }
    @keyframes slide { 0% { left: -40%; } 100% { left: 100%; } }
    .footer {
      position: absolute; bottom: 28px; left: 0; right: 0;
      font-size: 11px; color: rgba(255,255,255,0.2);
      letter-spacing: 0.05em;
    }
  </style>
</head>
<body>
  <div class="glow"></div>
  <div class="card">
    <div class="logo">⚡</div>
    <div class="wordmark">Bez <span class="g">Filtra</span></div>
    <div class="badge">przenosimy się na nowy serwer</div>
    <p class="message">
      Ulepszyliśmy infrastrukturę - <strong>Bez Filtra</strong> działa teraz
      na dedykowanym serwerze z akceleracją GPU.<br /><br />
      Znajdziesz nas pod nowym adresem:
    </p>
    <a class="btn" href="https://bezfiltra.beer">
      Przejdź na bezfiltra.beer →
    </a>
    <div class="countdown">automatyczne przekierowanie za <span id="s">8</span> s</div>
    <div class="bar"></div>
  </div>
  <div class="footer">crafted by NullPointer Studio · null safe, fully unchained</div>

  <script>
    var s = 8
    var el = document.getElementById('s')
    var t = setInterval(function() {
      s--
      el.textContent = s
      if (s <= 0) { clearInterval(t); location.href = 'https://bezfiltra.beer' }
    }, 1000)
  </script>
</body>
</html>
